name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            if [ ! -d /root/Telegram_Yt_Bot ]; then
              git clone https://github.com/HoomanJCode/Telegram_Yt_Bot.git /root/Telegram_Yt_Bot
            fi
            
            cd /root/Telegram_Yt_Bot
            git pull origin main
            chmod +x deploy.sh
            
            BOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
            BASE_URL="${{ secrets.BASE_URL }}" \
            WHITELIST_USERS="${{ secrets.WHITELIST_USERS }}" \
            STORAGE_DAYS="${{ vars.STORAGE_DAYS }}" \
            ./deploy.sh