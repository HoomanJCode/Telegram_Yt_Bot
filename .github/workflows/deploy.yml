# .github/workflows/deploy.yml - Complete replacement
name: Deploy TelegramYtBot to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PROJECT_DIR: /opt/TelegramYtBot
  SERVICE_NAME: telegramytbot

jobs:
  # Job 1: Test phase (fast feedback)
  test:
    runs-on: ubuntu-latest
    name: 🧪 Test & Build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: python -m unittest discover tests -v

  # Job 2: VPS setup (runs in parallel after tests)
  setup-vps:
    runs-on: ubuntu-latest
    name: 🔧 Setup VPS Environment
    needs: test
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      - run: mkdir -p ~/.ssh && ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: 📦 Install system packages
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'apt-get update -qq && apt-get install -y -qq python3 python3-pip python3-venv ffmpeg curl git build-essential'
      
      - name: 🔧 Install QuickJS-NG
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            'command -v qjs >/dev/null || (cd /tmp && git clone --depth 1 https://github.com/quickjs-ng/quickjs.git && cd quickjs && make -j$(nproc) && make install && rm -rf /tmp/quickjs)'

  # Job 3: Deploy (waits for both test and setup)
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy to VPS
    needs: [test, setup-vps]
    steps:
      - uses: actions/checkout@v4
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      - run: mkdir -p ~/.ssh && ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: 🚀 Deploy application
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          WHITELIST_USERS: ${{ secrets.WHITELIST_USERS || '' }}
          STORAGE_DAYS: ${{ vars.STORAGE_DAYS || '2' }}
          COOKIE_TTL_HOURS: ${{ vars.COOKIE_TTL_HOURS || '0' }}
          MAX_TELEGRAM_SIZE_MB: ${{ vars.MAX_TELEGRAM_SIZE_MB || '50' }}
          USE_WARP: ${{ secrets.USE_WARP || 'false' }}
          SSL_CERT_B64: ${{ secrets.SSL_CERT_B64 || '' }}
          SSL_KEY_B64: ${{ secrets.SSL_KEY_B64 || '' }}
        run: |
          # Create deploy script with improved error handling
          cat > /tmp/deploy_script.sh << 'SCRIPTEOF'
          #!/bin/bash
          set -e
          
          PROJECT_DIR="PROJECT_DIR_PLACEHOLDER"
          SERVICE_NAME="SERVICE_NAME_PLACEHOLDER"
          
          echo "========================================"
          echo "  TelegramYtBot Deployment"
          echo "========================================"
          
          run_with_timeout() {
            local timeout=$1; shift
            timeout "$timeout" "$@" || {
              [ $? -eq 124 ] && echo "❌ Timed out: $*" && return 124
              return $?
            }
          }
          
          # Stop service if running
          systemctl is-active --quiet $SERVICE_NAME && systemctl stop $SERVICE_NAME || true
          
          # Update code
          if [ -d "$PROJECT_DIR/.git" ]; then
            echo "📥 Pulling latest code..."
            cd "$PROJECT_DIR"
            run_with_timeout 300 git fetch origin || exit 1
            run_with_timeout 300 git reset --hard origin/master || exit 1
          else
            echo "📥 Cloning repository..."
            run_with_timeout 300 git clone --branch master https://github.com/HoomanJCode/Telegram_Yt_Bot.git "$PROJECT_DIR" || exit 1
            cd "$PROJECT_DIR"
          fi
          
          # Create .env
          echo "⚙️  Creating .env..."
          cat > "$PROJECT_DIR/.env" << EOF
          BOT_TOKEN=BOT_TOKEN_PLACEHOLDER
          BASE_DOWNLOAD_LINK=BASE_URL_PLACEHOLDER
          WHITELIST_USERS=WHITELIST_USERS_PLACEHOLDER
          STORAGE_DAYS=STORAGE_DAYS_PLACEHOLDER
          COOKIE_TTL_HOURS=COOKIE_TTL_HOURS_PLACEHOLDER
          MAX_TELEGRAM_FILE_SIZE=MAX_TELEGRAM_SIZE_PLACEHOLDER
          USE_WARP=USE_WARP_PLACEHOLDER
          EOF
          chmod 600 "$PROJECT_DIR/.env"
          
          [ -z "$(grep '^BOT_TOKEN=$' "$PROJECT_DIR/.env" 2>/dev/null)" ] || { echo "❌ BOT_TOKEN is empty!"; exit 1; }
          
          # Setup SSL (if provided)
          if [ -n "SSL_CERT_B64_PLACEHOLDER" ] && [ -n "SSL_KEY_B64_PLACEHOLDER" ]; then
            echo "🔐 Installing SSL certificates..."
            mkdir -p "$PROJECT_DIR/ssl"
            echo 'SSL_CERT_B64_PLACEHOLDER' | base64 -d > "$PROJECT_DIR/ssl/fullchain.pem" || exit 1
            echo 'SSL_KEY_B64_PLACEHOLDER' | base64 -d > "$PROJECT_DIR/ssl/privkey.pem" || exit 1
            chmod 600 "$PROJECT_DIR/ssl/privkey.pem"
            { echo ""; echo "SSL_CERT_FILE=$PROJECT_DIR/ssl/fullchain.pem"; echo "SSL_KEY_FILE=$PROJECT_DIR/ssl/privkey.pem"; } >> "$PROJECT_DIR/.env"
          fi
          
          # Setup Python venv (cached if exists)
          echo "🐍 Setting up Python..."
          cd "$PROJECT_DIR"
          if [ ! -f venv/bin/python ] || ! venv/bin/python -c "import pip" 2>/dev/null; then
            [ -d venv ] && rm -rf venv
            run_with_timeout 300 python3 -m venv venv || exit 1
          fi
          run_with_timeout 300 $PROJECT_DIR/venv/bin/pip install --upgrade pip -q || exit 1
          run_with_timeout 300 $PROJECT_DIR/venv/bin/pip install -r requirements.txt -q || exit 1
          run_with_timeout 300 $PROJECT_DIR/venv/bin/pip install --upgrade yt-dlp yt-dlp-ejs aiohttp -q || exit 1
          
          mkdir -p "$PROJECT_DIR/data" "$PROJECT_DIR/downloads" /var/log/$SERVICE_NAME
          
          # Validate config
          echo "🧪 Testing configuration..."
          $PROJECT_DIR/venv/bin/python -c "
          import sys; sys.path.insert(0, '$PROJECT_DIR')
          from config import Config
          c = Config()
          print(f'Token: SET' if c.BOT_TOKEN and 'YOUR_BOT_TOKEN' not in c.BOT_TOKEN else 'MISSING')
          print(f'Base URL: {c.BASE_DOWNLOAD_LINK}')
          print(f'Storage: {c.STORAGE_DAYS} days')
          " || exit 1
          
          # Create systemd service
          echo "🔧 Creating systemd service..."
          cat > /etc/systemd/system/$SERVICE_NAME.service << SERVICEEOF
          [Unit]
          Description=TelegramYtBot - YouTube Downloader
          After=network.target
          
          [Service]
          Type=simple
          User=root
          WorkingDirectory=$PROJECT_DIR
          Environment=PATH=$PROJECT_DIR/venv/bin:/usr/local/bin:/usr/bin:/bin
          ExecStart=$PROJECT_DIR/venv/bin/python $PROJECT_DIR/bot.py
          Restart=on-failure
          RestartSec=10
          RestartPreventExitStatus=78
          StandardOutput=append:/var/log/$SERVICE_NAME/bot.log
          StandardError=append:/var/log/$SERVICE_NAME/bot_error.log
          
          [Install]
          WantedBy=multi-user.target
          SERVICEEOF
          
          systemctl daemon-reload && systemctl enable $SERVICE_NAME
          
          # Start service
          echo "▶️  Starting service..."
          systemctl start $SERVICE_NAME
          sleep 5
          
          if systemctl is-active --quiet $SERVICE_NAME; then
            echo "✅ Service is running!"
            systemctl status $SERVICE_NAME --no-pager -l
          else
            echo "❌ Service failed!"
            tail -20 /var/log/$SERVICE_NAME/bot_error.log 2>/dev/null || true
            journalctl -u $SERVICE_NAME -n 20 --no-pager || true
            exit 1
          fi
          
          echo "✅ Deployment Complete!"
          SCRIPTEOF
          
          # Substitute and execute
          sed -i "s|PROJECT_DIR_PLACEHOLDER|${{ env.PROJECT_DIR }}|g" /tmp/deploy_script.sh
          sed -i "s|SERVICE_NAME_PLACEHOLDER|${{ env.SERVICE_NAME }}|g" /tmp/deploy_script.sh
          sed -i "s|BOT_TOKEN_PLACEHOLDER|${BOT_TOKEN}|g" /tmp/deploy_script.sh
          sed -i "s|BASE_URL_PLACEHOLDER|${BASE_URL}|g" /tmp/deploy_script.sh
          sed -i "s|WHITELIST_USERS_PLACEHOLDER|${WHITELIST_USERS}|g" /tmp/deploy_script.sh
          sed -i "s|STORAGE_DAYS_PLACEHOLDER|${STORAGE_DAYS}|g" /tmp/deploy_script.sh
          sed -i "s|COOKIE_TTL_HOURS_PLACEHOLDER|${COOKIE_TTL_HOURS}|g" /tmp/deploy_script.sh
          sed -i "s|MAX_TELEGRAM_SIZE_PLACEHOLDER|${MAX_TELEGRAM_SIZE_MB}|g" /tmp/deploy_script.sh
          sed -i "s|USE_WARP_PLACEHOLDER|${USE_WARP}|g" /tmp/deploy_script.sh
          sed -i "s|SSL_CERT_B64_PLACEHOLDER|${SSL_CERT_B64}|g" /tmp/deploy_script.sh
          sed -i "s|SSL_KEY_B64_PLACEHOLDER|${SSL_KEY_B64}|g" /tmp/deploy_script.sh
          
          scp /tmp/deploy_script.sh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/deploy_script.sh
          
          echo "📡 Executing deployment (timeout: 10 min)..."
          timeout 600 ssh \
            -o ConnectTimeout=10 \
            -o ServerAliveInterval=30 \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "bash /tmp/deploy_script.sh" || exit 1