# .github/workflows/deploy.yml
name: Deploy TelegramYtBot to VPS

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  PROJECT_DIR: /opt/TelegramYtBot
  SERVICE_NAME: telegramytbot

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: 🚀 Deploy to VPS
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔑 Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      
      - name: 🔗 Add host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      
      - name: 🚀 Deploy to VPS
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          BASE_URL: ${{ secrets.BASE_URL }}
          WHITELIST_USERS: ${{ secrets.WHITELIST_USERS || '' }}
          STORAGE_DAYS: ${{ vars.STORAGE_DAYS || '2' }}
          COOKIE_TTL_HOURS: ${{ vars.COOKIE_TTL_HOURS || '0' }}
          MAX_TELEGRAM_SIZE_MB: ${{ vars.MAX_TELEGRAM_SIZE_MB || '50' }}
        run: |
          cat > /tmp/deploy_script.sh << 'SCRIPTEOF'
          #!/bin/bash
          set -e
          
          PROJECT_DIR="PROJECT_DIR_PLACEHOLDER"
          SERVICE_NAME="SERVICE_NAME_PLACEHOLDER"
          
          echo "========================================"
          echo "  TelegramYtBot Deployment"
          echo "========================================"
          
          if systemctl is-active --quiet $SERVICE_NAME; then
            echo "⏹️  Stopping $SERVICE_NAME..."
            systemctl stop $SERVICE_NAME
            sleep 2
          fi
          
          echo "📦 Installing dependencies..."
          apt-get update -qq
          apt-get install -y -qq python3 python3-pip python3-venv ffmpeg curl git lsb-release gpg build-essential make cmake
          
          # Install QuickJS-NG (faster JS runtime for yt-dlp)
          if ! command -v qjs &>/dev/null; then
            echo "🔧 Installing QuickJS-NG..."
            cd /tmp
            rm -rf quickjs
            git clone --depth 1 https://github.com/quickjs-ng/quickjs.git quickjs
            cd quickjs
            make -j$(nproc)
            make install
            cd /opt/TelegramYtBot 2>/dev/null || cd /root
            rm -rf /tmp/quickjs
            echo "  ✓ QuickJS-NG installed"
          fi
          
          # Install Cloudflare Warp
          if ! command -v warp-cli &>/dev/null; then
            echo "🔧 Installing Cloudflare Warp..."
            curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | tee /etc/apt/sources.list.d/cloudflare-client.list
            apt-get update -qq
            apt-get install -y -qq cloudflare-warp
            warp-cli --accept-tos registration new
            warp-cli mode proxy
            warp-cli connect
            echo "  ✓ Warp connected"
          elif ! warp-cli status 2>/dev/null | grep -q "Connected"; then
            warp-cli connect
            echo "  ✓ Warp reconnected"
          fi
          
          if [ -d "$PROJECT_DIR/.git" ]; then
            echo "📥 Pulling latest code..."
            cd "$PROJECT_DIR"
            git fetch origin
            git reset --hard origin/master
            git clean -fd
          else
            echo "📥 Cloning repository..."
            rm -rf "$PROJECT_DIR"
            git clone --branch master https://github.com/HoomanJCode/Telegram_Yt_Bot.git "$PROJECT_DIR"
            cd "$PROJECT_DIR"
          fi
          
          echo "⚙️  Creating .env..."
          cat > "$PROJECT_DIR/.env" << EOF
          BOT_TOKEN=BOT_TOKEN_PLACEHOLDER
          BASE_DOWNLOAD_LINK=BASE_URL_PLACEHOLDER
          WHITELIST_USERS=WHITELIST_USERS_PLACEHOLDER
          STORAGE_DAYS=STORAGE_DAYS_PLACEHOLDER
          COOKIE_TTL_HOURS=COOKIE_TTL_HOURS_PLACEHOLDER
          MAX_TELEGRAM_FILE_SIZE=MAX_TELEGRAM_SIZE_PLACEHOLDER
          EOF
          chmod 600 "$PROJECT_DIR/.env"
          
          if grep -q "^BOT_TOKEN=$" "$PROJECT_DIR/.env" 2>/dev/null; then
            echo "❌ ERROR: BOT_TOKEN is empty!"
            exit 1
          fi
          
          echo "🐍 Setting up Python..."
          cd "$PROJECT_DIR"
          [ -d venv ] && rm -rf venv
          python3 -m venv venv
          $PROJECT_DIR/venv/bin/pip install --upgrade pip -q
          $PROJECT_DIR/venv/bin/pip install -r requirements.txt -q
          $PROJECT_DIR/venv/bin/pip install --upgrade yt-dlp yt-dlp-ejs aiohttp -q
          
          mkdir -p "$PROJECT_DIR/data" "$PROJECT_DIR/downloads"
          mkdir -p /var/log/$SERVICE_NAME
          
          echo "🧪 Testing configuration..."
          $PROJECT_DIR/venv/bin/python -c "
          import sys; sys.path.insert(0, '$PROJECT_DIR')
          from config import Config
          c = Config()
          print('Token:', 'SET' if c.BOT_TOKEN and 'YOUR_BOT_TOKEN' not in c.BOT_TOKEN else 'MISSING')
          print('Base URL:', c.BASE_DOWNLOAD_LINK)
          print('Storage:', c.STORAGE_DAYS, 'days')
          "
          
          echo "🔧 Creating service..."
          cat > /etc/systemd/system/$SERVICE_NAME.service << SERVICEEOF
          [Unit]
          Description=TelegramYtBot - YouTube Downloader
          After=network.target
          
          [Service]
          Type=simple
          User=root
          WorkingDirectory=$PROJECT_DIR
          Environment=PATH=$PROJECT_DIR/venv/bin:/usr/local/bin:/usr/bin:/bin
          ExecStart=$PROJECT_DIR/venv/bin/python $PROJECT_DIR/bot.py
          Restart=on-failure
          RestartSec=10
          StandardOutput=append:/var/log/$SERVICE_NAME/bot.log
          StandardError=append:/var/log/$SERVICE_NAME/bot_error.log
          
          [Install]
          WantedBy=multi-user.target
          SERVICEEOF
          
          systemctl daemon-reload
          systemctl enable $SERVICE_NAME
          
          echo "▶️  Starting service..."
          systemctl start $SERVICE_NAME
          sleep 5
          
          if systemctl is-active --quiet $SERVICE_NAME; then
            echo "✅ Service is running!"
            systemctl status $SERVICE_NAME --no-pager -l
          else
            echo "❌ Service failed!"
            echo "=== Error Log ==="
            tail -20 /var/log/$SERVICE_NAME/bot_error.log 2>/dev/null || true
            echo "=== Journal ==="
            journalctl -u $SERVICE_NAME -n 20 --no-pager || true
            exit 1
          fi
          
          echo "✅ Deployment Complete!"
          SCRIPTEOF
          
          sed -i "s|PROJECT_DIR_PLACEHOLDER|${{ env.PROJECT_DIR }}|g" /tmp/deploy_script.sh
          sed -i "s|SERVICE_NAME_PLACEHOLDER|${{ env.SERVICE_NAME }}|g" /tmp/deploy_script.sh
          sed -i "s|BOT_TOKEN_PLACEHOLDER|${BOT_TOKEN}|g" /tmp/deploy_script.sh
          sed -i "s|BASE_URL_PLACEHOLDER|${BASE_URL}|g" /tmp/deploy_script.sh
          sed -i "s|WHITELIST_USERS_PLACEHOLDER|${WHITELIST_USERS}|g" /tmp/deploy_script.sh
          sed -i "s|STORAGE_DAYS_PLACEHOLDER|${STORAGE_DAYS}|g" /tmp/deploy_script.sh
          sed -i "s|COOKIE_TTL_HOURS_PLACEHOLDER|${COOKIE_TTL_HOURS}|g" /tmp/deploy_script.sh
          sed -i "s|MAX_TELEGRAM_SIZE_PLACEHOLDER|${MAX_TELEGRAM_SIZE_MB}|g" /tmp/deploy_script.sh
          
          scp /tmp/deploy_script.sh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/tmp/deploy_script.sh
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "bash /tmp/deploy_script.sh"