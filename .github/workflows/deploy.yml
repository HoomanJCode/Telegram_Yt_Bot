name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            # Clone if not exists, otherwise pull
            if [ ! -d /root/Telegram_Yt_Bot ]; then
              git clone git@github.com:HoomanJCode/youtube-downloader-bot.git /root/Telegram_Yt_Bot
            fi
            
            cd /root/Telegram_Yt_Bot
            git pull origin main
            chmod +x deploy.sh
            ./deploy.sh